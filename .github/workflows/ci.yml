name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Build and test
        run: mvn clean verify --batch-mode

  spec-validation:
    if: >
      github.event_name == 'pull_request'
      && github.base_ref == 'develop'
      && startsWith(github.head_ref, 'specs')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate spec files
        run: |
          echo "Checking for spec files in specifications/..."
          SPECS=$(find specifications/ -name "spec.md" -type f 2>/dev/null)
          if [ -z "$SPECS" ]; then
            echo "::error::Aucun fichier spec.md trouvé dans specifications/"
            exit 1
          fi
          echo "Specs trouvées :"
          echo "$SPECS"
